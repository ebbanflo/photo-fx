<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>photo-fx — GPU Photo Effects</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#12151c;
    --panel-2:#181c26;
    --border:#242938;
    --text:#e6e9f0;
    --muted:#8b93a7;
    --accent:#5eead4;
    --accent-2:#f472b6;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  #app{
    display:flex;
    height:100%;
    min-height:100vh;
  }
  header{
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  header h1{
    font-size:16px;
    margin:0;
    font-weight:600;
    letter-spacing:0.02em;
  }
  header h1 span{color:var(--accent);}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;}
  button, .btn{
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    transition:background 0.15s,border-color 0.15s;
  }
  button:hover, .btn:hover{background:#20242f;border-color:#3a4155;}
  button.primary{background:var(--accent);color:#062421;border-color:var(--accent);font-weight:600;}
  button.primary:hover{background:#7ff2df;}
  button.accent2{background:var(--accent-2);color:#2a0616;border-color:var(--accent-2);font-weight:600;}
  button.accent2:hover{background:#f78bc4;}
  #main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  #canvasWrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    min-height:0;
    overflow:auto;
  }
  #canvasWrap.dragging::after{
    content:"Drop image to load";
    position:absolute;
    inset:12px;
    border:2px dashed var(--accent);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--accent);
    font-size:14px;
    background:rgba(94,234,212,0.06);
    pointer-events:none;
  }
  canvas#gl{
    max-width:100%;
    max-height:78vh;
    border-radius:10px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    background:#000;
  }
  #sidebar{
    width:340px;
    flex-shrink:0;
    border-left:1px solid var(--border);
    background:var(--panel);
    overflow-y:auto;
    padding:16px;
  }
  .group{
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:12px;
    background:var(--panel-2);
  }
  .group h2{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0 0 10px 0;
    color:var(--accent);
    font-weight:700;
  }
  .row{
    margin-bottom:10px;
  }
  .row:last-child{margin-bottom:0;}
  .row label{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .row label .val{color:var(--text);font-variant-numeric:tabular-nums;}
  input[type=range]{
    width:100%;
    accent-color:var(--accent);
    height:4px;
    cursor:pointer;
  }
  .hint{
    font-size:11.5px;
    color:var(--muted);
    line-height:1.5;
    margin-top:2px;
  }
  #fileInput{display:none;}
  footer.note{
    padding:8px 20px 16px;
    font-size:11.5px;
    color:var(--muted);
  }
  @media (max-width: 860px){
    #app{flex-direction:column;}
    #sidebar{width:100%;border-left:none;border-top:1px solid var(--border);}
    canvas#gl{max-height:50vh;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <header>
      <h1>photo<span>-fx</span></h1>
      <div class="toolbar">
        <button id="loadBtn">Load Photo</button>
        <input type="file" id="fileInput" accept="image/*">
        <button id="randomizeBtn" class="accent2">🎲 Randomize</button>
        <button id="resetBtn">Reset</button>
        <button id="exportBtn" class="primary">Export PNG</button>
      </div>
    </header>
    <div id="canvasWrap">
      <canvas id="gl"></canvas>
    </div>
    <footer class="note">Drag &amp; drop an image anywhere on the canvas, or use Load Photo. All rendering happens live on the GPU via WebGL.</footer>
  </div>

  <div id="sidebar">

    <div class="group">
      <h2>Chromatic Aberration</h2>
      <div class="row">
        <label>Amount <span class="val" data-out="ca_amount">0.30</span></label>
        <input type="range" data-u="uCaAmount" min="0" max="1" step="0.01" value="0.3">
      </div>
    </div>

    <div class="group">
      <h2>Halation</h2>
      <div class="row">
        <label>Threshold <span class="val" data-out="halation_threshold">0.55</span></label>
        <input type="range" data-u="uHalationThreshold" min="0" max="1" step="0.01" value="0.55">
      </div>
      <div class="row">
        <label>Intensity <span class="val" data-out="halation_intensity">0.40</span></label>
        <input type="range" data-u="uHalationIntensity" min="0" max="2" step="0.01" value="0.4">
      </div>
      <div class="row">
        <label>Radius <span class="val" data-out="halation_radius">2.00</span></label>
        <input type="range" data-u="uHalationRadius" min="0.2" max="6" step="0.1" value="2.0">
      </div>
    </div>

    <div class="group">
      <h2>Film Grain</h2>
      <div class="row">
        <label>Intensity <span class="val" data-out="grain_intensity">0.15</span></label>
        <input type="range" data-u="uGrainIntensity" min="0" max="1" step="0.01" value="0.15">
      </div>
      <div class="row">
        <label>Grain Size <span class="val" data-out="grain_size">1.50</span></label>
        <input type="range" data-u="uGrainSize" min="1" max="6" step="0.1" value="1.5">
      </div>
    </div>

    <div class="group">
      <h2>Color Grade — Lift / Gamma / Gain</h2>
      <div class="row">
        <label>Lift (shadows) <span class="val" data-out="lift">0.00</span></label>
        <input type="range" data-u="uLift" min="-0.5" max="0.5" step="0.01" value="0">
      </div>
      <div class="row">
        <label>Gamma (midtones) <span class="val" data-out="gamma">1.00</span></label>
        <input type="range" data-u="uGamma" min="0.2" max="3" step="0.01" value="1">
      </div>
      <div class="row">
        <label>Gain (highlights) <span class="val" data-out="gain">1.00</span></label>
        <input type="range" data-u="uGain" min="0" max="2" step="0.01" value="1">
      </div>
    </div>

    <div class="group">
      <h2>Vignette</h2>
      <div class="row">
        <label>Intensity <span class="val" data-out="vignette_intensity">0.40</span></label>
        <input type="range" data-u="uVignetteIntensity" min="0" max="1" step="0.01" value="0.4">
      </div>
      <div class="row">
        <label>Radius <span class="val" data-out="vignette_radius">0.75</span></label>
        <input type="range" data-u="uVignetteRadius" min="0.2" max="1.5" step="0.01" value="0.75">
      </div>
      <div class="row">
        <label>Softness <span class="val" data-out="vignette_softness">0.45</span></label>
        <input type="range" data-u="uVignetteSoftness" min="0.05" max="1" step="0.01" value="0.45">
      </div>
    </div>

    <div class="group">
      <h2>Warp / Liquify</h2>
      <div class="row">
        <label>Amount <span class="val" data-out="warp_amount">0.00</span></label>
        <input type="range" data-u="uWarpAmount" min="-1" max="1" step="0.01" value="0">
      </div>
      <div class="row">
        <label>Radius <span class="val" data-out="warp_radius">0.50</span></label>
        <input type="range" data-u="uWarpRadius" min="0.1" max="1" step="0.01" value="0.5">
      </div>
    </div>

    <div class="group">
      <h2>Glitch / Corruption</h2>
      <div class="row">
        <label>Glitch Intensity <span class="val" data-out="glitch_intensity">0.00</span></label>
        <input type="range" data-u="uGlitchIntensity" min="0" max="1" step="0.01" value="0">
      </div>
      <div class="row">
        <label>Scanlines <span class="val" data-out="scanline_intensity">0.00</span></label>
        <input type="range" data-u="uScanlineIntensity" min="0" max="1" step="0.01" value="0">
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  var canvas = document.getElementById("gl");
  var gl = canvas.getContext("webgl", { preserveDrawingBuffer: true, antialias: true })
        || canvas.getContext("experimental-webgl", { preserveDrawingBuffer: true, antialias: true });

  if (!gl) {
    document.getElementById("canvasWrap").innerHTML =
      '<p style="color:#f87171;padding:24px;">WebGL is not available in this browser.</p>';
    return;
  }

  var VERT_SRC = [
    "attribute vec2 aPos;",
    "varying vec2 vUv;",
    "void main(){",
    "  vUv = aPos * 0.5 + 0.5;",
    "  gl_Position = vec4(aPos, 0.0, 1.0);",
    "}"
  ].join("\n");

  var FRAG_SRC = [
    "precision highp float;",
    "varying vec2 vUv;",
    "uniform sampler2D uTexture;",
    "uniform vec2 uResolution;",
    "uniform float uTime;",
    "uniform float uCaAmount;",
    "uniform float uHalationThreshold;",
    "uniform float uHalationIntensity;",
    "uniform float uHalationRadius;",
    "uniform float uGrainIntensity;",
    "uniform float uGrainSize;",
    "uniform float uLift;",
    "uniform float uGamma;",
    "uniform float uGain;",
    "uniform float uVignetteIntensity;",
    "uniform float uVignetteRadius;",
    "uniform float uVignetteSoftness;",
    "uniform float uWarpAmount;",
    "uniform float uWarpRadius;",
    "uniform float uGlitchIntensity;",
    "uniform float uScanlineIntensity;",

    "float hash(vec2 p){",
    "  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);",
    "}",

    "void main(){",
    "  vec2 center = vec2(0.5);",
    "  float aspect = uResolution.x / uResolution.y;",
    "  vec2 uv = vUv;",

    // --- glitch: screen-space horizontal slice displacement + channel corruption ---
    "  float burst = floor(uTime * 6.0);",
    "  float lineY = floor(uv.y * 48.0);",
    "  float sliceRand = hash(vec2(lineY, burst));",
    "  float sliceActive = step(0.8, sliceRand) * uGlitchIntensity;",
    "  float sliceOffset = (hash(vec2(lineY, burst + 7.0)) - 0.5) * 0.2 * sliceActive;",
    "  uv.x += sliceOffset;",

    // --- warp / liquify: radial swirl around center ---
    "  vec2 d = uv - center; d.x *= aspect;",
    "  float rdist = length(d);",
    "  float swirl = smoothstep(uWarpRadius, 0.0, rdist) * uWarpAmount * 6.28318;",
    "  float sN = sin(swirl); float cN = cos(swirl);",
    "  vec2 rd = vec2(d.x * cN - d.y * sN, d.x * sN + d.y * cN);",
    "  rd.x /= aspect;",
    "  uv = center + rd;",

    // --- chromatic aberration: per-channel radial sample offset ---
    "  vec2 caDir = uv - center; caDir.x *= aspect;",
    "  float caMag = uCaAmount * (0.01 + 0.04 * length(caDir));",
    "  vec2 caDirN = caDir; caDirN.x /= aspect;",
    "  vec2 off = caDirN * caMag;",
    "  float rC = texture2D(uTexture, uv + off).r;",
    "  float gC = texture2D(uTexture, uv).g;",
    "  float bC = texture2D(uTexture, uv - off).b;",
    "  vec3 color = vec3(rC, gC, bC);",

    // glitch channel-swap corruption on active lines
    "  float corrupt = step(0.88, sliceRand) * sliceActive;",
    "  color = mix(color, color.brg, corrupt);",

    // --- halation: thresholded bloom tinted warm, ring-sampled ---
    "  vec2 texel = 1.0 / uResolution;",
    "  vec3 bloomAccum = vec3(0.0);",
    "  const int TAPS = 8;",
    "  for (int i = 0; i < TAPS; i++) {",
    "    float ang = 6.28318 * float(i) / float(TAPS);",
    "    vec2 samp = uv + vec2(cos(ang), sin(ang)) * texel * uHalationRadius * 8.0;",
    "    vec3 s = texture2D(uTexture, samp).rgb;",
    "    float lum = dot(s, vec3(0.299, 0.587, 0.114));",
    "    float bright = max(lum - uHalationThreshold, 0.0);",
    "    bloomAccum += s * bright;",
    "  }",
    "  bloomAccum /= float(TAPS);",
    "  color += bloomAccum * uHalationIntensity * vec3(1.0, 0.55, 0.3) * 3.0;",

    // --- color grade: lift / gamma / gain (ASC CDL order) ---
    "  color = clamp(color * uGain + uLift, 0.0, 1.0);",
    "  color = pow(color, vec3(1.0 / max(uGamma, 0.001)));",

    // --- vignette: static, based on original (unwarped) uv ---
    "  vec2 vd = vUv - center; vd.x *= aspect;",
    "  float vdist = length(vd);",
    "  float vig = 1.0 - smoothstep(uVignetteRadius - uVignetteSoftness, uVignetteRadius, vdist) * uVignetteIntensity;",
    "  color *= vig;",

    // --- animated film grain ---
    "  vec2 grainCell = floor(vUv * uResolution / max(uGrainSize, 1.0));",
    "  float gN = hash(grainCell + floor(uTime * 24.0) * vec2(1.7, 2.3));",
    "  color += (gN - 0.5) * 2.0 * uGrainIntensity * 0.2;",

    // --- scanline corruption ---
    "  float scan = sin(vUv.y * uResolution.y * 3.14159) * 0.5 + 0.5;",
    "  color *= mix(1.0, scan, uScanlineIntensity * 0.5);",

    "  gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);",
    "}"
  ].join("\n");

  function compileShader(type, src){
    var sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
      throw new Error("Shader compile error: " + gl.getShaderInfoLog(sh));
    }
    return sh;
  }

  var program = gl.createProgram();
  gl.attachShader(program, compileShader(gl.VERTEX_SHADER, VERT_SRC));
  gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, FRAG_SRC));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)){
    throw new Error("Program link error: " + gl.getProgramInfoLog(program));
  }
  gl.useProgram(program);

  var quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  var quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(program, "aPos");
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uniformLoc = {};
  ["uTexture","uResolution","uTime","uCaAmount","uHalationThreshold","uHalationIntensity",
   "uHalationRadius","uGrainIntensity","uGrainSize","uLift","uGamma","uGain",
   "uVignetteIntensity","uVignetteRadius","uVignetteSoftness","uWarpAmount","uWarpRadius",
   "uGlitchIntensity","uScanlineIntensity"].forEach(function(name){
    uniformLoc[name] = gl.getUniformLocation(program, name);
  });

  var texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  var MAX_DIM = 2048;

  function loadImageSource(source){
    var w = source.naturalWidth || source.width;
    var h = source.naturalHeight || source.height;
    var scale = Math.min(1, MAX_DIM / Math.max(w, h));
    var tw = Math.round(w * scale);
    var th = Math.round(h * scale);

    var off = document.createElement("canvas");
    off.width = tw; off.height = th;
    off.getContext("2d").drawImage(source, 0, 0, tw, th);

    canvas.width = tw;
    canvas.height = th;
    gl.viewport(0, 0, tw, th);

    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, off);
  }

  function makePlaceholderImage(){
    var c = document.createElement("canvas");
    c.width = 1200; c.height = 800;
    var ctx = c.getContext("2d");

    var sky = ctx.createLinearGradient(0, 0, 0, 560);
    sky.addColorStop(0, "#1b1035");
    sky.addColorStop(0.45, "#5a2a6b");
    sky.addColorStop(0.75, "#e0663f");
    sky.addColorStop(1, "#f7c463");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 1200, 560);

    var sunGrad = ctx.createRadialGradient(760, 480, 10, 760, 480, 220);
    sunGrad.addColorStop(0, "rgba(255,250,230,1)");
    sunGrad.addColorStop(0.35, "rgba(255,225,160,0.9)");
    sunGrad.addColorStop(1, "rgba(255,180,120,0)");
    ctx.fillStyle = sunGrad;
    ctx.fillRect(0, 0, 1200, 560);
    ctx.fillStyle = "#fff8e8";
    ctx.beginPath(); ctx.arc(760, 480, 90, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = "#120a1e";
    for (var i = 0; i < 5; i++){
      var mx = i * 260 - 80;
      ctx.beginPath();
      ctx.moveTo(mx, 560);
      ctx.lineTo(mx + 130, 380 - i * 18);
      ctx.lineTo(mx + 260, 560);
      ctx.closePath();
      ctx.fill();
    }

    var water = ctx.createLinearGradient(0, 560, 0, 800);
    water.addColorStop(0, "#3a1f4d");
    water.addColorStop(1, "#0d0716");
    ctx.fillStyle = water;
    ctx.fillRect(0, 560, 1200, 240);
    ctx.fillStyle = "rgba(255,210,150,0.5)";
    ctx.fillRect(700, 560, 120, 240);

    return c;
  }

  var img = new Image();
  img.onload = function(){ loadImageSource(img); };
  img.crossOrigin = "anonymous";

  loadImageSource(makePlaceholderImage());

  // ---- UI wiring ----
  var state = {};
  var sliders = Array.prototype.slice.call(document.querySelectorAll("input[type=range]"));

  function fmt(v){
    return (Math.round(v * 100) / 100).toFixed(2);
  }

  function syncSlider(slider){
    var name = slider.getAttribute("data-u");
    state[name] = parseFloat(slider.value);
    var out = slider.parentElement.querySelector(".val");
    if (out) out.textContent = fmt(state[name]);
  }

  sliders.forEach(function(slider){
    syncSlider(slider);
    slider.addEventListener("input", function(){ syncSlider(slider); });
  });

  var defaults = sliders.map(function(s){ return s.value; });

  document.getElementById("randomizeBtn").addEventListener("click", function(){
    sliders.forEach(function(slider){
      var min = parseFloat(slider.min), max = parseFloat(slider.max);
      var val = min + Math.random() * (max - min);
      slider.value = val;
      syncSlider(slider);
    });
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    sliders.forEach(function(slider, i){
      slider.value = defaults[i];
      syncSlider(slider);
    });
  });

  // ---- file loading ----
  var fileInput = document.getElementById("fileInput");
  document.getElementById("loadBtn").addEventListener("click", function(){ fileInput.click(); });

  function handleFile(file){
    if (!file || file.type.indexOf("image/") !== 0) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var image = new Image();
      image.onload = function(){ loadImageSource(image); };
      image.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener("change", function(e){
    if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
  });

  var canvasWrap = document.getElementById("canvasWrap");
  ["dragenter","dragover"].forEach(function(evt){
    canvasWrap.addEventListener(evt, function(e){
      e.preventDefault(); e.stopPropagation();
      canvasWrap.classList.add("dragging");
    });
  });
  ["dragleave","drop"].forEach(function(evt){
    canvasWrap.addEventListener(evt, function(e){
      e.preventDefault(); e.stopPropagation();
      canvasWrap.classList.remove("dragging");
    });
  });
  canvasWrap.addEventListener("drop", function(e){
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  // ---- export ----
  document.getElementById("exportBtn").addEventListener("click", function(){
    render(performance.now());
    canvas.toBlob(function(blob){
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "photo-fx-export.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }, "image/png");
  });

  // ---- render loop ----
  var startTime = performance.now();

  function render(now){
    var t = (now - startTime) / 1000;

    gl.uniform2f(uniformLoc.uResolution, canvas.width, canvas.height);
    gl.uniform1f(uniformLoc.uTime, t);
    gl.uniform1f(uniformLoc.uCaAmount, state.uCaAmount);
    gl.uniform1f(uniformLoc.uHalationThreshold, state.uHalationThreshold);
    gl.uniform1f(uniformLoc.uHalationIntensity, state.uHalationIntensity);
    gl.uniform1f(uniformLoc.uHalationRadius, state.uHalationRadius);
    gl.uniform1f(uniformLoc.uGrainIntensity, state.uGrainIntensity);
    gl.uniform1f(uniformLoc.uGrainSize, state.uGrainSize);
    gl.uniform1f(uniformLoc.uLift, state.uLift);
    gl.uniform1f(uniformLoc.uGamma, state.uGamma);
    gl.uniform1f(uniformLoc.uGain, state.uGain);
    gl.uniform1f(uniformLoc.uVignetteIntensity, state.uVignetteIntensity);
    gl.uniform1f(uniformLoc.uVignetteRadius, state.uVignetteRadius);
    gl.uniform1f(uniformLoc.uVignetteSoftness, state.uVignetteSoftness);
    gl.uniform1f(uniformLoc.uWarpAmount, state.uWarpAmount);
    gl.uniform1f(uniformLoc.uWarpRadius, state.uWarpRadius);
    gl.uniform1f(uniformLoc.uGlitchIntensity, state.uGlitchIntensity);
    gl.uniform1f(uniformLoc.uScanlineIntensity, state.uScanlineIntensity);
    gl.uniform1i(uniformLoc.uTexture, 0);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, texture);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  function loop(now){
    render(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
